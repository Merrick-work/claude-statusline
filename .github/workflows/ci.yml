name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck statusline.sh install.sh

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: run statusline.sh against sample fixture
        run: |
          actual=$(./statusline.sh < tests/sample-input.json)
          expected=$(cat tests/expected-output.txt)
          if [ "$actual" != "$expected" ]; then
            echo "expected: $expected"
            echo "actual:   $actual"
            exit 1
          fi
          echo "smoke test passed: $actual"
